name: Build OpenClaw Mini Final

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref from openclaw/openclaw to build
        required: true
        default: refs/tags/v2026.3.24
        type: string
      image_name:
        description: GHCR image name under winffychu namespace
        required: true
        default: openclaw
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: winffychu

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
            image_tag: 2026.3.24-mini-amd64-final-r1
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            image_tag: 2026.3.24-mini-arm64-final-r1
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout upstream OpenClaw
        uses: actions/checkout@v4
        with:
          repository: openclaw/openclaw
          ref: ${{ inputs.ref }}
          fetch-depth: 1

      - name: Patch bundled runtime deps
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          script = Path('scripts/stage-bundled-plugin-runtime-deps.mjs')
          text = script.read_text(encoding='utf-8')
          needle = '  const packageJson = readJson(manifestPath);\n  let changed = false;\n'
          insert = '  const packageJson = readJson(manifestPath);\n  let changed = false;\n\n  const nextOverrides = { ...(packageJson.overrides ?? {}) };\n  if (nextOverrides["@hono/node-server"] !== "1.19.10") {\n    nextOverrides["@hono/node-server"] = "1.19.10";\n    packageJson.overrides = nextOverrides;\n    changed = true;\n  }\n'
          if needle in text and insert not in text:
              text = text.replace(needle, insert, 1)
          script.write_text(text, encoding='utf-8')
          PY

      - name: Generate final mini Dockerfile
        shell: bash
        run: |
          cat > Dockerfile.final-mini <<'EOF'
          ARG OPENCLAW_NODE_BOOKWORM_IMAGE=node:24-bookworm
          ARG OPENCLAW_NODE_BOOKWORM_SLIM_IMAGE=node:24-bookworm-slim

          FROM ${OPENCLAW_NODE_BOOKWORM_IMAGE} AS build
          RUN set -eux; \
              for attempt in 1 2 3 4 5; do \
                if curl --retry 5 --retry-all-errors --retry-delay 2 -fsSL https://bun.sh/install | bash; then \
                  break; \
                fi; \
                if [ "$attempt" -eq 5 ]; then exit 1; fi; \
                sleep $((attempt * 2)); \
              done
          ENV PATH=/root/.bun/bin:${PATH}
          RUN corepack enable
          WORKDIR /app
          COPY package.json pnpm-lock.yaml pnpm-workspace.yaml .npmrc ./
          COPY ui/package.json ./ui/package.json
          COPY patches ./patches
          RUN --mount=type=cache,id=openclaw-pnpm-store-final-mini,target=/root/.local/share/pnpm/store,sharing=locked \
              NODE_OPTIONS=--max-old-space-size=2048 pnpm install --frozen-lockfile
          COPY . .
          RUN for dir in /app/extensions /app/.agent /app/.agents; do \
                if [ -d "$dir" ]; then \
                  find "$dir" -type d -exec chmod 755 {} +; \
                  find "$dir" -type f -exec chmod 644 {} +; \
                fi; \
              done
          RUN pnpm canvas:a2ui:bundle || \
              (echo "A2UI bundle: creating stub (non-fatal)" && \
               mkdir -p src/canvas-host/a2ui && \
               echo "/* A2UI bundle unavailable in this build */" > src/canvas-host/a2ui/a2ui.bundle.js && \
               echo "stub" > src/canvas-host/a2ui/.bundle.hash && \
               rm -rf vendor/a2ui apps/shared/OpenClawKit/Tools/CanvasA2UI)
          RUN pnpm build:docker
          ENV OPENCLAW_PREFER_PNPM=1
          RUN pnpm ui:build
          RUN CI=true pnpm prune --prod && \
              find dist -type f \( -name '*.d.ts' -o -name '*.d.mts' -o -name '*.d.cts' -o -name '*.map' \) -delete && \
              find node_modules -type f \( -iname 'README*' -o -iname 'CHANGELOG*' -o -iname 'LICENSE*' -o -iname '*.md' -o -iname '*.markdown' -o -name '*.map' -o -name '*.tsbuildinfo' \) -delete && \
              find node_modules -type d \( -name test -o -name tests -o -name __tests__ -o -name docs -o -name .github -o -name example -o -name examples \) -prune -exec rm -rf '{}' + && \
              find node_modules -type f \( -name '*.a' -o -name '*.o' -o -name '*.h' -o -name '*.hh' -o -name '*.hpp' -o -name '*.c' -o -name '*.cc' -o -name '*.cpp' -o -name '*.cxx' -o -name 'binding.gyp' -o -name '*.gypi' -o -name 'CMakeLists.txt' -o -name '*.cmake' \) -delete

          FROM ${OPENCLAW_NODE_BOOKWORM_SLIM_IMAGE}
          WORKDIR /app
          RUN --mount=type=cache,id=openclaw-final-mini-apt-cache,target=/var/cache/apt,sharing=locked \
              --mount=type=cache,id=openclaw-final-mini-apt-lists,target=/var/lib/apt,sharing=locked \
              apt-get update && \
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends ca-certificates && \
              npm install -g npm@11.12.1 && \
              rm -rf /var/lib/apt/lists/*
          RUN chown node:node /app
          COPY --from=build --chown=node:node /app/dist ./dist
          COPY --from=build --chown=node:node /app/node_modules ./node_modules
          COPY --from=build --chown=node:node /app/package.json .
          COPY --from=build --chown=node:node /app/openclaw.mjs .
          COPY --from=build --chown=node:node /app/extensions ./extensions
          COPY --from=build --chown=node:node /app/skills ./skills
          ENV NODE_ENV=production
          ENV OPENCLAW_BUNDLED_PLUGINS_DIR=/app/extensions
          RUN node --version && npm --version && ln -sf /app/openclaw.mjs /usr/local/bin/openclaw && chmod 755 /app/openclaw.mjs && node openclaw.mjs --help >/dev/null
          USER node
          HEALTHCHECK --interval=3m --timeout=10s --start-period=15s --retries=3 \
            CMD node -e "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
          CMD ["node", "openclaw.mjs", "gateway", "--allow-unconfigured"]
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${{ env.REGISTRY }}/${{ env.OWNER }}/${{ inputs.image_name }}"
          {
            echo "image=${IMAGE}"
            echo "revision=$(git rev-parse HEAD)"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push final mini image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.final-mini
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          cache-from: type=gha,scope=openclaw-${{ matrix.arch }}-mini-final-r1
          cache-to: type=gha,mode=max,scope=openclaw-${{ matrix.arch }}-mini-final-r1
          tags: ${{ steps.meta.outputs.image }}:${{ matrix.image_tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/openclaw/openclaw
            org.opencontainers.image.revision=${{ steps.meta.outputs.revision }}
            org.opencontainers.image.description=Final mini release-candidate image
