name: Build OpenClaw ARM64

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref from openclaw/openclaw to build, for example main or refs/tags/v2026.3.24
        required: true
        default: refs/tags/v2026.3.24
        type: string
      image_name:
        description: GHCR image name under winffychu namespace
        required: true
        default: openclaw
        type: string
      image_tag:
        description: Image tag to publish, for example 2026.3.24-arm64
        required: true
        default: 2026.3.24-arm64
        type: string
      slim_tag:
        description: Slim image tag to publish, for example 2026.3.24-slim-arm64
        required: true
        default: 2026.3.24-slim-arm64
        type: string

concurrency:
  group: build-openclaw-arm64-${{ inputs.image_name }}-${{ inputs.image_tag }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: winffychu

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout upstream OpenClaw
        uses: actions/checkout@v4
        with:
          repository: openclaw/openclaw
          ref: ${{ inputs.ref }}
          fetch-depth: 1

      - name: Show source revision
        run: |
          git rev-parse HEAD
          git describe --tags --always || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${{ env.REGISTRY }}/${{ env.OWNER }}/${{ inputs.image_name }}"
          {
            echo "image=${IMAGE}"
            echo "revision=$(git rev-parse HEAD)"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push arm64 default image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          provenance: false
          cache-from: type=gha,scope=openclaw-arm64-default
          cache-to: type=gha,mode=max,scope=openclaw-arm64-default
          tags: ${{ steps.meta.outputs.image }}:${{ inputs.image_tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/openclaw/openclaw
            org.opencontainers.image.revision=${{ steps.meta.outputs.revision }}

      - name: Build and push arm64 slim image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          provenance: false
          cache-from: type=gha,scope=openclaw-arm64-slim
          cache-to: type=gha,mode=max,scope=openclaw-arm64-slim
          build-args: |
            OPENCLAW_VARIANT=slim
          tags: ${{ steps.meta.outputs.image }}:${{ inputs.slim_tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/openclaw/openclaw
            org.opencontainers.image.revision=${{ steps.meta.outputs.revision }}

      - name: Summary
        run: |
          echo "Default image: ${{ steps.meta.outputs.image }}:${{ inputs.image_tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Slim image: ${{ steps.meta.outputs.image }}:${{ inputs.slim_tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Revision: ${{ steps.meta.outputs.revision }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Note: slim is the recommended smaller image when keeping upstream functionality close to official behavior." >> "$GITHUB_STEP_SUMMARY"
