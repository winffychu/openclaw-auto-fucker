name: Build OpenClaw Alpine Final

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref from openclaw/openclaw to build
        required: true
        default: refs/tags/v2026.3.24
        type: string
      image_name:
        description: GHCR image name under winffychu namespace
        required: true
        default: openclaw
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: winffychu

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
            image_tag: 2026.3.24-alpine-amd64-final-r1
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            image_tag: 2026.3.24-alpine-arm64-final-r1
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout upstream OpenClaw
        uses: actions/checkout@v4
        with:
          repository: openclaw/openclaw
          ref: ${{ inputs.ref }}
          fetch-depth: 1

      - name: Patch bundled runtime deps
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          script = Path('scripts/stage-bundled-plugin-runtime-deps.mjs')
          text = script.read_text(encoding='utf-8')
          needle = '  const packageJson = readJson(manifestPath);\n  let changed = false;\n'
          insert = '  const packageJson = readJson(manifestPath);\n  let changed = false;\n\n  const nextOverrides = { ...(packageJson.overrides ?? {}) };\n  if (nextOverrides["@hono/node-server"] !== "1.19.10") {\n    nextOverrides["@hono/node-server"] = "1.19.10";\n    packageJson.overrides = nextOverrides;\n    changed = true;\n  }\n'
          if needle in text and insert not in text:
              text = text.replace(needle, insert, 1)
          script.write_text(text, encoding='utf-8')
          PY

      - name: Generate final alpine Dockerfile
        shell: bash
        run: |
          cat > Dockerfile.final-alpine <<'EOF'
          ARG GLIBC_VERSIONS="2.39-r0 2.38-r1 2.35-r1"

          FROM node:24-alpine AS build
          ARG GLIBC_VERSIONS
          RUN set -eux; \
              apk add --no-cache bash curl git python3 make g++ libc6-compat ca-certificates binutils xz linux-headers; \
              curl -fsSL --retry 5 --retry-all-errors --retry-delay 2 https://alpine-pkgs.sgerrand.com/sgerrand.rsa.pub -o /etc/apk/keys/sgerrand.rsa.pub; \
              installed=''; \
              for version in $GLIBC_VERSIONS; do \
                base_url="https://github.com/sgerrand/alpine-pkg-glibc/releases/download/${version}"; \
                rm -f /tmp/glibc.apk /tmp/glibc-bin.apk; \
                if curl -fsSL --retry 5 --retry-all-errors --retry-delay 2 "$base_url/glibc-${version}.apk" -o /tmp/glibc.apk && \
                   curl -fsSL --retry 5 --retry-all-errors --retry-delay 2 "$base_url/glibc-bin-${version}.apk" -o /tmp/glibc-bin.apk; then \
                  apk add --no-cache --force-overwrite /tmp/glibc.apk /tmp/glibc-bin.apk; \
                  /usr/glibc-compat/sbin/ldconfig /lib /usr/glibc-compat/lib; \
                  installed=1; \
                  break; \
                fi; \
              done; \
              test -n "$installed"; \
              rm -f /tmp/glibc.apk /tmp/glibc-bin.apk
          RUN corepack enable
          WORKDIR /app
          COPY package.json pnpm-lock.yaml pnpm-workspace.yaml .npmrc ./
          COPY ui/package.json ./ui/package.json
          COPY patches ./patches
          RUN pnpm install --frozen-lockfile
          COPY . .
          RUN pnpm canvas:a2ui:bundle || true
          RUN pnpm build:docker
          ENV OPENCLAW_PREFER_PNPM=1
          RUN pnpm ui:build
          RUN CI=true pnpm prune --prod && \
              find dist -type f \( -name '*.d.ts' -o -name '*.d.mts' -o -name '*.d.cts' -o -name '*.map' \) -delete && \
              find node_modules -type f \( -iname 'README*' -o -iname 'CHANGELOG*' -o -iname 'LICENSE*' -o -iname '*.md' -o -iname '*.markdown' -o -name '*.map' -o -name '*.tsbuildinfo' \) -delete && \
              find node_modules -type d \( -name test -o -name tests -o -name __tests__ -o -name docs -o -name .github -o -name example -o -name examples \) -prune -exec rm -rf '{}' + && \
              find node_modules -type f \( -name '*.a' -o -name '*.o' -o -name '*.h' -o -name '*.hh' -o -name '*.hpp' -o -name '*.c' -o -name '*.cc' -o -name '*.cpp' -o -name '*.cxx' -o -name 'binding.gyp' -o -name '*.gypi' -o -name 'CMakeLists.txt' -o -name '*.cmake' \) -delete

          FROM node:24-alpine
          ARG GLIBC_VERSIONS
          RUN set -eux; \
              apk add --no-cache curl libc6-compat ca-certificates openssl; \
              apk upgrade --no-cache; \
              curl -fsSL --retry 5 --retry-all-errors --retry-delay 2 https://alpine-pkgs.sgerrand.com/sgerrand.rsa.pub -o /etc/apk/keys/sgerrand.rsa.pub; \
              installed=''; \
              for version in $GLIBC_VERSIONS; do \
                base_url="https://github.com/sgerrand/alpine-pkg-glibc/releases/download/${version}"; \
                rm -f /tmp/glibc.apk /tmp/glibc-bin.apk; \
                if curl -fsSL --retry 5 --retry-all-errors --retry-delay 2 "$base_url/glibc-${version}.apk" -o /tmp/glibc.apk && \
                   curl -fsSL --retry 5 --retry-all-errors --retry-delay 2 "$base_url/glibc-bin-${version}.apk" -o /tmp/glibc-bin.apk; then \
                  apk add --no-cache --force-overwrite /tmp/glibc.apk /tmp/glibc-bin.apk; \
                  /usr/glibc-compat/sbin/ldconfig /lib /usr/glibc-compat/lib; \
                  installed=1; \
                  break; \
                fi; \
              done; \
              test -n "$installed"; \
              rm -f /tmp/glibc.apk /tmp/glibc-bin.apk
          WORKDIR /app
          COPY --from=build /app/dist ./dist
          COPY --from=build /app/node_modules ./node_modules
          COPY --from=build /app/package.json ./
          COPY --from=build /app/openclaw.mjs ./
          COPY --from=build /app/extensions ./extensions
          COPY --from=build /app/skills ./skills
          ENV NODE_ENV=production
          ENV OPENCLAW_BUNDLED_PLUGINS_DIR=/app/extensions
          RUN npm install -g npm@11.12.1 && node --version && npm --version && ln -sf /app/openclaw.mjs /usr/local/bin/openclaw && chmod 755 /app/openclaw.mjs && node openclaw.mjs --help >/dev/null
          USER node
          CMD ["node", "openclaw.mjs", "gateway", "--allow-unconfigured"]
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:buildx-stable-1

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${{ env.REGISTRY }}/${{ env.OWNER }}/${{ inputs.image_name }}"
          {
            echo "image=${IMAGE}"
            echo "revision=$(git rev-parse HEAD)"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push final alpine image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.final-alpine
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          cache-from: type=gha,scope=openclaw-${{ matrix.arch }}-alpine-final-r1
          cache-to: type=gha,mode=max,scope=openclaw-${{ matrix.arch }}-alpine-final-r1
          tags: ${{ steps.meta.outputs.image }}:${{ matrix.image_tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/openclaw/openclaw
            org.opencontainers.image.revision=${{ steps.meta.outputs.revision }}
            org.opencontainers.image.description=Final alpine release-candidate image
